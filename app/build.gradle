plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.neoswap'
    compileSdk 34

    defaultConfig {
        applicationId "com.neoswap"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }

    // This block prevents the 'Cannot mutate' error during resource processing
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
            pickFirsts += 'lib/x86/libopencv_java4.so'
            pickFirsts += 'lib/x86_64/libopencv_java4.so'
            pickFirsts += 'lib/armeabi-v7a/libopencv_java4.so'
            pickFirsts += 'lib/arm64-v8a/libopencv_java4.so'
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    
    // The Engine: Explicitly defined to prevent dependency observation conflicts
    implementation ('com.google.android.gms:play-services-mlkit-face-detection:17.1.0')
    implementation ('com.quickbirdstudios:opencv:4.5.3.0')
}
